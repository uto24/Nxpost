<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Block Buster - Verify Email</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        // সাময়িক সাইন-আপ ডাটা না থাকলে রিডাইরেক্ট করবে
        if (!sessionStorage.getItem('temp_signup')) {
            window.location.href = '/signup';
        }
    </script>
</head>
<body class="bg-gray-950 font-sans min-h-screen flex justify-center text-white">

    <div class="w-full max-w-md bg-[#1B5E20] min-h-screen flex flex-col justify-between p-6 overflow-y-auto shadow-2xl relative">
        <div class="text-center mt-12">
            <h1 class="text-4xl font-black text-yellow-300 tracking-wide drop-shadow-[0_5px_5px_rgba(0,0,0,0.5)]">BLOCK BUSTER</h1>
        </div>

        <!-- Verification Card -->
        <div class="w-full bg-black/40 backdrop-blur-md rounded-3xl p-6 text-center space-y-4">
            <h2 class="text-lg font-bold"><i class="fa-solid fa-envelope-open-text mr-2 text-yellow-300"></i>Email Verification</h2>
            <p class="text-xs text-green-300">আপনার জিমেইলে একটি ৬-ডিজিটের ওটিপি কোড পাঠানো হয়েছে। সেটি নিচে লিখুন:</p>
            
            <input id="signup-otp" type="text" placeholder="Enter 6-Digit OTP" class="w-full p-3 rounded-2xl bg-white/10 text-white placeholder-gray-300 border border-white/20 text-center text-lg tracking-widest focus:outline-none focus:ring-2 focus:ring-green-400">
            
            <button onclick="verifyAndRegister()" class="w-full bg-[#4CAF50] hover:bg-green-600 py-3 rounded-full text-white font-extrabold text-lg shadow-lg border-b-4 border-green-700">
                <i class="fa-solid fa-circle-check mr-2"></i> Verify & Register
            </button>
        </div>

        <p class="text-[10px] text-gray-400 text-center">Agree to <span class="underline">User Agreement</span> and <span class="underline">Privacy Policy</span></p>
    </div>

<script>
    // ১. সাময়িক সাইন-আপ ডাটা না থাকলে রিডাইরেক্ট করবে (পেইজের একদম শুরুতে চেক)
    if (!sessionStorage.getItem('temp_signup')) {
        window.location.href = '/signup';
    }

    // ২. জটিল এরর ডিকোড করে দেখানোর হেল্পার ফাংশন
    function showError(data) {
        if (!data) return alert("ত্রুটি ঘটেছে। আবার চেষ্টা করুন।");
        if (typeof data.detail === 'string') {
            return alert(data.detail);
        }
        if (Array.isArray(data.detail)) {
            const msgs = data.detail.map(err => {
                const field = err.loc[err.loc.length - 1];
                return `${field}: ${err.msg}`;
            });
            return alert("ভ্যালিডেশন ত্রুটি:\n" + msgs.join("\n"));
        }
        if (data.error) {
            return alert(data.error);
        }
        alert(JSON.stringify(data));
    }

    // ৩. ওটিপি ভেরিফিকেশন ও রেজিস্ট্রেশন ফাংশন (Try-Catch ও HTML Error প্রুফ)
    async function verifyAndRegister() {
        const otp = document.getElementById('signup-otp').value;
        const temp = sessionStorage.getItem('temp_signup');

        if (!otp) {
            return alert("অনুগ্রহ করে ওটিপি কোডটি লিখুন।");
        }
        if (!temp) {
            window.location.href = '/signup';
            return;
        }

        try {
            const tempUser = JSON.parse(temp);

            const response = await fetch('/api/signup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    action: 'verify_and_register',
                    email: tempUser.email,
                    password: tempUser.password,
                    device_fingerprint: tempUser.device_fingerprint,
                    otp_code: otp,
                    referrer_id: tempUser.referrer_id
                })
            });

            // রেসপন্স টাইপ চেক করা (HTML এরর ক্র্যাশ প্রতিরোধ করতে)
            const contentType = response.headers.get("content-type");
            let data;
            
            if (contentType && contentType.includes("application/json")) {
                data = await response.json();
            } else {
                // যদি সার্ভার থেকে HTML এরর পেজ (যেমন Vercel 502/500) আসে
                const errorText = await response.text();
                console.error("Non-JSON Server Error Response: ", errorText);
                return alert("সার্ভার থেকে ত্রুটিপূর্ণ HTML রেসপন্স এসেছে। দয়া করে Vercel Logs চেক করুন।");
            }

            if (response.ok) {
                alert("নিবন্ধন সফল হয়েছে!");
                sessionStorage.removeItem('temp_signup'); // সাময়িক সেশন ক্লিন
                localStorage.setItem('blockbuster_user', JSON.stringify(data.user)); // মেইন সেশন সেভ
                window.location.href = '/'; // গেম ড্যাশবোর্ডে প্রবেশ
            } else {
                showError(data);
            }
            
        } catch (err) {
            // নেটওয়ার্ক ফেইল বা জাভাস্ক্রিপ্ট এরর ক্যাচ করা
            console.error("Network or JS Exception: ", err);
            alert("নেটওয়ার্ক সংযোগে সমস্যা হয়েছে অথবা সার্ভার ডাউন আছে।");
        }
    }
</script>
