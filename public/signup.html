<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Block Buster - Sign Up</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        // সেশন থাকলে সরাসরি গেম পেইজে রিডাইরেক্ট
        if (localStorage.getItem('blockbuster_user')) {
            window.location.href = '/';
        }
    </script>
</head>
<body class="bg-gray-950 font-sans min-h-screen flex justify-center text-white">

    <div class="w-full max-w-md bg-[#1B5E20] min-h-screen flex flex-col justify-between p-6 overflow-y-auto shadow-2xl relative">
        <div class="text-center mt-6">
            <h1 class="text-4xl font-black text-yellow-300 tracking-wide drop-shadow-[0_5px_5px_rgba(0,0,0,0.5)]">BLOCK BUSTER</h1>
        </div>

        <!-- Signup Form Card -->
        <div class="w-full bg-black/40 backdrop-blur-md rounded-3xl p-6 text-center space-y-4">
            <h2 class="text-lg font-bold"><i class="fa-solid fa-user-plus mr-2 text-yellow-300"></i>Create Account</h2>
            
            <div id="signup-fields-step1" class="space-y-4">
                <!-- জিমেইল এবং পাসওয়ার্ড ইনপুট (ডিভাইস ইনপুট ফিল্ডটি এখন নেই) -->
                <input id="signup-email" type="email" placeholder="example@gmail.com" class="w-full p-3 rounded-2xl bg-white/10 text-white placeholder-gray-300 border border-white/20 focus:outline-none">
                <input id="signup-password" type="password" placeholder="Choose Password" class="w-full p-3 rounded-2xl bg-white/10 text-white placeholder-gray-300 border border-white/20 focus:outline-none">
                <input id="signup-ref" type="text" placeholder="Referral Code (Optional)" class="w-full p-3 rounded-2xl bg-white/10 text-white placeholder-gray-300 border border-white/20 focus:outline-none">
                
                <button onclick="requestSignupOTP()" class="w-full bg-yellow-500 hover:bg-yellow-600 py-3 rounded-full text-black font-extrabold text-lg shadow-lg">
                    <i class="fa-solid fa-paper-plane mr-2"></i> Send OTP to Gmail
                </button>
            </div>

            <!-- OTP input view -->
            <div id="signup-fields-step2" class="hidden space-y-4">
                <div class="text-xs text-green-300">একটি ৬-ডিজিটের ওটিপি কোড আপনার জিমেলে পাঠানো হয়েছে। সেটি নিচে লিখুন:</div>
                <input id="signup-otp" type="text" placeholder="Enter 6-Digit OTP" class="w-full p-3 rounded-2xl bg-white/10 text-white placeholder-gray-300 border border-white/20 text-center text-lg tracking-widest focus:outline-none">
                
                <button onclick="verifyAndRegister()" class="w-full bg-[#4CAF50] hover:bg-green-600 py-3 rounded-full text-white font-extrabold text-lg shadow-lg border-b-4 border-green-700">
                    <i class="fa-solid fa-circle-check mr-2"></i> Verify & Register
                </button>
            </div>

            <p class="text-xs text-gray-400">Already have an account? <a href="/login" class="text-yellow-300 underline font-bold">Log In</a></p>
        </div>

        <p class="text-[10px] text-gray-400 text-center">Agree to <span class="underline">User Agreement</span> and <span class="underline">Privacy Policy</span></p>
    </div>

    <script>
        // ব্যাকগ্রাউন্ডে ব্রাউজার মেটাডাটা থেকে ইউনিক ডিভাইস আইডি জেনারেট করার লজিক
        function autoGenerateDeviceFingerprint() {
            const ua = navigator.userAgent;
            const width = window.screen.width;
            const height = window.screen.height;
            const language = navigator.language;
            const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
            
            // সব ডাটা একসাথে যুক্ত করে একটি স্ট্রিং তৈরি করা
            const rawString = `${ua}-${width}x${height}-${language}-${timezone}`;
            
            // একটি সাধারণ কিন্তু নিরাপদ হ্যাশ ফাংশন রান করে ইউনিক কোড জেনারেট করা
            let hash = 0;
            for (let i = 0; i < rawString.length; i++) {
                const char = rawString.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash; // 32bit integer এ কনভার্ট করা
            }
            return "DF_" + Math.abs(hash);
        }

        async function requestSignupOTP() {
            const email = document.getElementById('signup-email').value;
            const password = document.getElementById('signup-password').value;
            const ref = document.getElementById('signup-ref').value;

            if (!email || !password) {
                return alert("ইমেইল এবং পাসওয়ার্ড পূরণ করা আবশ্যক।");
            }

            // ব্যাকগ্রাউন্ডে স্বয়ংক্রিয়ভাবে ডিভাইস ফিঙ্গারপ্রিন্ট রিড করা হচ্ছে
            const autoDeviceFingerprint = autoGenerateDeviceFingerprint();

            const response = await fetch('/api/signup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    action: 'send_otp',
                    email: email,
                    device_fingerprint: autoDeviceFingerprint,
                    password: password
                })
            });

            const data = await response.json();
            if (response.ok) {
                alert(data.message);
                
                // ভেরিফিকেশনের সুবিধার্থে ডাটা সাময়িকভাবে sessionStorage এ সেভ করে রাখা
                const tempUser = { 
                    email: email, 
                    device_fingerprint: autoDeviceFingerprint, 
                    password: password, 
                    referrer_id: ref ? parseInt(ref) : null 
                };
                sessionStorage.setItem('temp_signup', JSON.stringify(tempUser));
                
                // ওটিপি প্যানেল চালু করা
                document.getElementById('signup-fields-step1').classList.add('hidden');
                document.getElementById('signup-fields-step2').classList.remove('hidden');
            } else {
                alert(data.detail || "ত্রুটি ঘটেছে। আবার চেষ্টা করুন।");
            }
        }

        async function verifyAndRegister() {
            const otp = document.getElementById('signup-otp').value;
            const temp = sessionStorage.getItem('temp_signup');

            if (!otp) {
                return alert("অনুগ্রহ করে ওটিপি কোডটি লিখুন।");
            }
            if (!temp) {
                window.location.href = '/signup';
                return;
            }

            const tempUser = JSON.parse(temp);

            const response = await fetch('/api/signup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    action: 'verify_and_register',
                    email: tempUser.email,
                    password: tempUser.password,
                    device_fingerprint: tempUser.device_fingerprint,
                    otp_code: otp,
                    referrer_id: tempUser.referrer_id
                })
            });

            const data = await response.json();
            if (response.ok) {
                alert("নিবন্ধন সফল হয়েছে!");
                sessionStorage.removeItem('temp_signup');
                localStorage.setItem('blockbuster_user', JSON.stringify(data.user));
                window.location.href = '/';
            } else {
                alert(data.detail || "ভুল ওটিপি কোড।");
            }
        }
    </script>
</body>
</html>
