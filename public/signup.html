<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Block Buster - Sign Up</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        // সেশন থাকলে সরাসরি ড্যাশবোর্ডে প্রবেশ করাবে
        if (localStorage.getItem('blockbuster_user')) {
            window.location.href = '/';
        }
    </script>
</head>
<body class="bg-gray-950 font-sans min-h-screen flex justify-center text-white">

    <div class="w-full max-w-md bg-[#1B5E20] min-h-screen flex flex-col justify-between p-6 overflow-y-auto shadow-2xl relative">
        <div class="text-center mt-6">
            <h1 class="text-4xl font-black text-yellow-300 tracking-wide drop-shadow-[0_5px_5px_rgba(0,0,0,0.5)]">BLOCK BUSTER</h1>
        </div>

        <!-- Signup Form Card (এখন এখানে কোনো ওটিপি ইনপুট বা স্টেপ-২ নেই) -->
        <div class="w-full bg-black/40 backdrop-blur-md rounded-3xl p-6 text-center space-y-4">
            <h2 class="text-lg font-bold"><i class="fa-solid fa-user-plus mr-2 text-yellow-300"></i>Create Account</h2>
            
            <div class="space-y-4">
                <input id="signup-email" type="email" placeholder="example@gmail.com" class="w-full p-3 rounded-2xl bg-white/10 text-white placeholder-gray-300 border border-white/20 focus:outline-none">
                <input id="signup-password" type="password" placeholder="Choose Password" class="w-full p-3 rounded-2xl bg-white/10 text-white placeholder-gray-300 border border-white/20 focus:outline-none">
                <input id="signup-ref" type="text" placeholder="Referral Code (Optional)" class="w-full p-3 rounded-2xl bg-white/10 text-white placeholder-gray-300 border border-white/20 focus:outline-none">
                
                <button onclick="requestSignupOTP()" class="w-full bg-yellow-500 hover:bg-yellow-600 py-3 rounded-full text-black font-extrabold text-lg shadow-lg">
                    <i class="fa-solid fa-paper-plane mr-2"></i> Send OTP to Gmail
                </button>
            </div>

            <p class="text-xs text-gray-400">Already have an account? <a href="/login" class="text-yellow-300 underline font-bold">Log In</a></p>
        </div>

        <p class="text-[10px] text-gray-400 text-center">Agree to <span class="underline">User Agreement</span> and <span class="underline">Privacy Policy</span></p>
    </div>

    <script>
        // ব্যাকগ্রাউন্ডে ব্রাউজার মেটাডাটা থেকে ইউনিক ডিভাইস আইডি জেনারেট
        function autoGenerateDeviceFingerprint() {
            const ua = navigator.userAgent;
            const width = window.screen.width;
            const height = window.screen.height;
            const language = navigator.language;
            const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
            
            const rawString = `${ua}-${width}x${height}-${language}-${timezone}`;
            
            let hash = 0;
            for (let i = 0; i < rawString.length; i++) {
                const char = rawString.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            return "DF_" + Math.abs(hash);
        }

        // এরর ডিকোড সহকারী
        function showError(data) {
            if (!data) return alert("ত্রুটি ঘটেছে। আবার চেষ্টা করুন।");
            if (typeof data.detail === 'string') {
                return alert(data.detail);
            }
            if (Array.isArray(data.detail)) {
                const msgs = data.detail.map(err => {
                    const field = err.loc[err.loc.length - 1];
                    return `${field}: ${err.msg}`;
                });
                return alert("ভ্যালিডেশন ত্রুটি:\n" + msgs.join("\n"));
            }
            if (data.error) {
                return alert(data.error);
            }
            alert(JSON.stringify(data));
        }

        async function requestSignupOTP() {
            const email = document.getElementById('signup-email').value;
            const password = document.getElementById('signup-password').value;
            const ref = document.getElementById('signup-ref').value;

            if (!email || !password) {
                return alert("ইমেইল এবং পাসওয়ার্ড পূরণ করা আবশ্যক।");
            }

            const autoDeviceFingerprint = autoGenerateDeviceFingerprint();

            // রেফারেল কোড ফিল্টারিং
            let refInt = null;
            if (ref) {
                const cleanRef = ref.replace(/\D/g, ''); 
                if (cleanRef) {
                    refInt = parseInt(cleanRef, 10);
                }
            }

            const response = await fetch('/api/signup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    action: 'send_otp',
                    email: email,
                    device_fingerprint: autoDeviceFingerprint,
                    password: password
                })
            });

            const data = await response.json();
            if (response.ok) {
                alert(data.message);
                
                // ওটিপি ভেরিফাই পেইজের সুবিধার্থে ডাটা sessionStorage-এ সেভ করা
                const tempUser = { 
                    email: email, 
                    device_fingerprint: autoDeviceFingerprint, 
                    password: password, 
                    referrer_id: refInt 
                };
                sessionStorage.setItem('temp_signup', JSON.stringify(tempUser));
                
                // সরাসরি আপনার ভেরিফাই পেইজে রিডাইরেক্ট করা হচ্ছে!
                window.location.href = '/verify';
            } else {
                showError(data);
            }
        }
    </script>
</body>
</html>
